name: Build and Release macOS App (DMG)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build macOS DMG in Cloud
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS App
        run: |
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then 
            filetype_parameter="workspace"
            file_to_build="`ls -A | grep -i \\.xcworkspace\$`"
          else 
            filetype_parameter="project"
            file_to_build="`ls -A | grep -i \\.xcodeproj\$`"
          fi
          
          scheme=$(xcodebuild -list -json | ruby -r json -e 'puts JSON.parse(STDIN.read)["project"]["schemes"][0]')

          xcodebuild archive \
            -$filetype_parameter "$file_to_build" \
            -scheme "$scheme" \
            -destination "generic/platform=macOS" \
            -archivePath ./build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Extract App Version from Xcode
        id: get_version
        run: |
          VERSION=$(grep -m1 "MARKETING_VERSION =" Spectrum.xcodeproj/project.pbxproj | awk '{print $3}' | tr -d ';')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "APP_VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          APP_PATH=$(find build/App.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          
          # Erstellt jetzt explizit "Spectrum.dmg"
          create-dmg \
            --volname "$APP_NAME Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME" 175 120 \
            --hide-extension "$APP_NAME" \
            --app-drop-link 425 120 \
            "build/dmg/Spectrum.dmg" \
            "$APP_PATH"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/dmg/Spectrum.dmg
          tag_name: ${{ steps.get_version.outputs.APP_VERSION }}
          name: Spectrum ${{ steps.get_version.outputs.APP_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
